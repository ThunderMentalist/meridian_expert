validated_baseline:
  meridian_version: "1.5.1"
  distribution_name: "google-meridian"
  notes: "Validated assumptions align with Meridian 1.5.1 and Meridian_Aux 1.5.1 compatibility expectations."
  last_confirmed_ref: "v1.5.1"
  last_confirmed_date: "2026-04-15"

packaging:
  warning: "Packaging mismatch: meridian_aux imports Meridian in source but does not explicitly declare google-meridian in pyproject.toml."

under_tested_modules:
  - src/meridian_aux/nest/nest.py

notes:
  - "Analyzer is a crucial downstream contract surface for multiple Meridian_Aux modules."
  - "Model facade changes can cascade into transformation and posterior-name consumers."

relationships:
  - upstream: meridian/analysis/analyzer.py
    dependency_mode: semi_internal
    hotspot_tier: tier_1
    support_tests:
      - tests/test_contribution_control_contribution.py
      - tests/test_optimization_roi.py
      - tests/test_diagnostics_residuals.py
      - tests/test_dashboard_nordic_client.py
      - tests/test_nest_nest.py
    known_breakage_patterns:
      - Analyzer constructor drift
      - Analyzer output schema drift (summary_metrics, expected_vs_actual_data, response_curves, hill_curves, optimal_freq)
    explicit_risk_by_dependent:
      src/meridian_aux/contribution/control_contribution.py: high
      src/meridian_aux/optimization/roi.py: medium
      src/meridian_aux/diagnostics/residuals.py: medium
      src/meridian_aux/data/actuals_vs_fitted.py: medium
      src/meridian_aux/data/curves.py: medium
      src/meridian_aux/dashboard/nordic_client.py: high
      src/meridian_aux/nest/nest.py: high
    dependents:
      - src/meridian_aux/contribution/control_contribution.py
      - src/meridian_aux/optimization/roi.py
      - src/meridian_aux/diagnostics/residuals.py
      - src/meridian_aux/data/actuals_vs_fitted.py
      - src/meridian_aux/data/curves.py
      - src/meridian_aux/dashboard/nordic_client.py
      - src/meridian_aux/nest/nest.py

  - upstream: meridian/model/model.py
    dependency_mode: semi_internal
    reconstructs_model_behavior: true
    hotspot_tier: tier_1
    support_tests:
      - tests/test_predict.py
      - tests/test_charts_transformed.py
      - tests/test_diagnostics_multicollinearity.py
      - tests/test_study_iterate.py
      - tests/test_contribution_control_contribution.py
    known_breakage_patterns:
      - fitted-model tensor attribute/storage drift
      - ModelContext / ModelEquations refactor pressure
      - posterior variable name drift (beta_*, alpha_*, ec_*, slope_*, mu_t, knot_values)
    explicit_risk_by_dependent:
      src/meridian_aux/predict/predict.py: very_high
      src/meridian_aux/charts/transformed.py: very_high
      src/meridian_aux/diagnostics/multicollinearity.py: high
      src/meridian_aux/study/iterate.py: high
      src/meridian_aux/contribution/control_contribution.py: high
    dependents:
      - src/meridian_aux/predict/predict.py
      - src/meridian_aux/charts/transformed.py
      - src/meridian_aux/diagnostics/multicollinearity.py
      - src/meridian_aux/study/iterate.py
      - src/meridian_aux/contribution/control_contribution.py

  - upstream: meridian/model/adstock_hill.py
    dependency_mode: semi_internal
    reconstructs_model_behavior: true
    hotspot_tier: tier_1
    support_tests:
      - tests/test_predict.py
      - tests/test_charts_transformed.py
      - tests/test_diagnostics_multicollinearity.py
      - tests/test_data_curves.py
    known_breakage_patterns:
      - adstock_hill_media/rf deprecation pressure
      - _get_scaled_data_tensors helper drift
      - _inverse_outcome helper drift
    explicit_risk_by_dependent:
      src/meridian_aux/predict/predict.py: very_high
      src/meridian_aux/charts/transformed.py: very_high
      src/meridian_aux/diagnostics/multicollinearity.py: high
      src/meridian_aux/data/curves.py: high
    dependents:
      - src/meridian_aux/predict/predict.py
      - src/meridian_aux/charts/transformed.py
      - src/meridian_aux/diagnostics/multicollinearity.py
      - src/meridian_aux/data/curves.py

  - upstream: meridian/model/transformers.py
    dependency_mode: semi_internal
    reconstructs_model_behavior: true
    hotspot_tier: tier_1
    support_tests:
      - tests/test_predict.py
      - tests/test_charts_transformed.py
      - tests/test_diagnostics_multicollinearity.py
      - tests/test_data_curves.py
    known_breakage_patterns:
      - DataTensors.validate_and_fill_missing_data() signature drift
      - _get_scaled_data_tensors helper drift
      - _inverse_outcome helper drift
    explicit_risk_by_dependent:
      src/meridian_aux/predict/predict.py: very_high
      src/meridian_aux/charts/transformed.py: very_high
      src/meridian_aux/diagnostics/multicollinearity.py: high
      src/meridian_aux/data/curves.py: high
    dependents:
      - src/meridian_aux/predict/predict.py
      - src/meridian_aux/charts/transformed.py
      - src/meridian_aux/diagnostics/multicollinearity.py
      - src/meridian_aux/data/curves.py

  - upstream: meridian/model/equations.py
    dependency_mode: semi_internal
    reconstructs_model_behavior: true
    hotspot_tier: tier_2
    support_tests:
      - tests/test_predict.py
      - tests/test_charts_transformed.py
      - tests/test_data_curves.py
    known_breakage_patterns:
      - ModelEquations refactor pressure
      - posterior variable name drift (beta_*, alpha_*, ec_*, slope_*, mu_t, knot_values)
    explicit_risk_by_dependent:
      src/meridian_aux/predict/predict.py: very_high
      src/meridian_aux/charts/transformed.py: very_high
      src/meridian_aux/data/curves.py: high
    dependents:
      - src/meridian_aux/predict/predict.py
      - src/meridian_aux/charts/transformed.py
      - src/meridian_aux/data/curves.py

  - upstream: meridian/analysis/visualizer.py
    dependency_mode: publicish_output
    hotspot_tier: tier_2
    support_tests:
      - tests/test_nest_nest.py
    known_breakage_patterns:
      - Analyzer output schema drift (response_curves, hill_curves)
    explicit_risk_by_dependent:
      src/meridian_aux/nest/nest.py: high
    dependents:
      - src/meridian_aux/nest/nest.py

  - upstream: meridian/data/input_data.py
    dependency_mode: schema_convention
    hotspot_tier: tier_2
    support_tests:
      - tests/test_predict.py
    known_breakage_patterns:
      - DataTensors.validate_and_fill_missing_data() signature drift
    explicit_risk_by_dependent:
      src/meridian_aux/predict/predict.py: high
    dependents:
      - src/meridian_aux/predict/predict.py

source_authority:
  - implementation
  - tests
  - docs_examples_notebooks
  - changelog
  - approved_learning
