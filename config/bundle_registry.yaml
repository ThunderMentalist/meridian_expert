    neighboring_bundles: [meridian_model_facade_lifecycle, meridian_optimization_core, meridian_visualization_summary]
    expansion_hints:
      - Treat analyzer as a major downstream consumer of model internals.
    optional_support_files: [meridian/analysis/test_utils.py]
    notes: "Analyzer is a crucial downstream consumer and should not be treated as isolated analysis-only logic."

