bundles:
  - name: meridian_model_facade_lifecycle
    priority_rank: 1
    priority: high
    task_family_weights: {theory: 1.0, usage: 1.0, updates: 1.0, triage: 0.7}
    package_domain_weights: {model: 1.0, analysis: 0.4, auto: 0.6}
    anchor_files:
      - meridian/model/model.py
    primary_files:
      - meridian/model/model.py
      - meridian/model/model_test.py
      - meridian/model/model_test_data.py
      - meridian/model/model_test_data_test.py
    supporting_tests:
      - meridian/model/model_test.py
      - meridian/model/model_test_data_test.py
    neighboring_bundles: [meridian_model_math_core, meridian_analyzer_core]
    expansion_hints:
      - Expand to analyzer and transform bundles when model internals are touched.
    optional_support_files: [meridian/constants.py, meridian/version.py]
    notes: "Meridian model.py is a façade/orchestrator and lifecycle entrypoint, not the full theory surface."

  - name: meridian_model_math_core
    priority_rank: 2
    priority: high
    task_family_weights: {theory: 1.0, usage: 0.9, updates: 0.9}
    package_domain_weights: {model: 1.0, auto: 0.7}
    anchor_files: [meridian/model/equations.py, meridian/model/transformers.py]
    primary_files:
      - meridian/model/adstock_hill.py
      - meridian/model/transformers.py
      - meridian/model/equations.py
    supporting_tests:
      - meridian/model/adstock_hill_test.py
      - meridian/model/transformers_test.py
      - meridian/model/equations_test.py
    neighboring_bundles: [meridian_model_facade_lifecycle, meridian_input_data_contract]
    expansion_hints:
      - Include InputData contract checks for coordinate and channel assumptions.
    optional_support_files: []
    notes: "Mathematical transform and equation core used by model-object dependent aux code."

  - name: meridian_model_contracts
    priority_rank: 3
    priority: high
    task_family_weights: {theory: 0.9, usage: 0.8, updates: 0.9}
    package_domain_weights: {model: 1.0, data: 0.5}
    anchor_files: [meridian/model/context.py, meridian/model/spec.py]
    primary_files:
      - meridian/model/context.py
      - meridian/model/spec.py
      - meridian/model/prior_distribution.py
      - meridian/model/media.py
      - meridian/model/knots.py
    supporting_tests:
      - meridian/model/context_test.py
      - meridian/model/spec_test.py
      - meridian/model/prior_distribution_test.py
      - meridian/model/media_test.py
      - meridian/model/knots_test.py
    neighboring_bundles: [meridian_model_facade_lifecycle, meridian_sampling_fitting]
    expansion_hints: [Cross-check context and tensor contract assumptions.] 
    optional_support_files: []
    notes: "Contracts and priors used downstream by analyzer and model adapters."

  - name: meridian_analyzer_core
    priority_rank: 4
    priority: high
    task_family_weights: {theory: 1.0, usage: 1.0, updates: 1.0, triage: 1.0}
    package_domain_weights: {analysis: 1.0, optimization: 0.7, auto: 0.6}
