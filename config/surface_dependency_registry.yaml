  - aux_file: src/meridian_aux/study/iterate.py
    cross_repo_route: schema_posterior_convention_aux
    dependency_mode: duck_typed
    hotspot_tier: tier_2
    compat_shim: false
    under_tested: false
    meridian_anchor_files: [meridian/model/model.py, meridian/schema/serde/meridian_serde.py]
    mandatory_meridian_expansions: [meridian/schema/processors/model_processor.py]
    supporting_tests: [tests/test_study_iterate.py]
    known_breakage_patterns: [duck-typed object expectation drift]
    notes: "Iterative study workflow with duck-typed model/posterior assumptions."

  - aux_file: src/meridian_aux/charts/coefficients.py
    cross_repo_route: schema_posterior_convention_aux
    dependency_mode: schema_convention
    hotspot_tier: tier_2
    compat_shim: false
    under_tested: false
    meridian_anchor_files: [meridian/model/model.py, meridian/schema/serde/inference_data.py]
    mandatory_meridian_expansions: [meridian/model/transformers.py]
    supporting_tests: [tests/test_charts_coefficients.py]
    known_breakage_patterns: [posterior naming convention drift]
    notes: "Coefficient charting based on posterior conventions."

  - aux_file: src/meridian_aux/diagnostics/tstats.py
    cross_repo_route: schema_posterior_convention_aux
    dependency_mode: schema_convention
    hotspot_tier: tier_3
    compat_shim: false
    under_tested: false
    meridian_anchor_files: [meridian/schema/serde/inference_data.py]
    mandatory_meridian_expansions: [meridian/model/model.py]
    supporting_tests: [tests/test_diagnostics_tstats.py]
    known_breakage_patterns: [posterior variable/shape convention drift]
    notes: "T-stat diagnostics over posterior convention surfaces."

  - aux_file: src/meridian_aux/contribution/media_contribution.py
    cross_repo_route: decomposition_bridge_aux
    dependency_mode: semi_internal
    hotspot_tier: tier_2
    compat_shim: false
    under_tested: false
    meridian_anchor_files:
      - meridian/analysis/visualizer.py
      - meridian/analysis/analyzer.py
    mandatory_meridian_expansions: [meridian/model/model.py]
    supporting_tests: [tests/test_contribution_media_contribution.py]
    known_breakage_patterns: [visualizer.MediaSummary contribution_metrics drift]
    notes: "Bridge between aux contribution helpers and visualizer decomposition metrics."
